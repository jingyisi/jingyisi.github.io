name: Sync from Gitee

on:
  schedule:
    - cron: '0 6 * * *' # 每天早上6点自动同步
  workflow_dispatch:     # 也可以手动触发

jobs: 
  sync:
    runs-on: ubuntu-latest
 
    steps:
      # 第一步：从 Gitee 拉取代码
      - name: Checkout code from Gitee
        uses: actions/checkout@v4
        with:
          repository: 'jingyisi/jingyisi-my-project' # 确保这是 Gitee 的用户名/仓库名
          token: ${{ secrets.GITEE_TOKEN }}
          fetch-depth: 0

      # 第二步：推送到 GitHub（使用官方推荐的标准方式）
      - name: Push to GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # 强制推送到 GitHub，使用 GitHub 自动提供的令牌
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/jingyisi/jingyisi_gitee_and_github.git --force --all
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/jingyisi/jingyisi_gitee_and_github.git --force --tags
